server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers applied in every location block
    # (nginx add_header in location overrides server-level, so must repeat)

    # HTML — always revalidate
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control                "no-cache, must-revalidate"                always;
        add_header X-Content-Type-Options       "nosniff"                                  always;
        add_header X-Frame-Options              "DENY"                                     always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"          always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"      always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=()" always;
    }

    # JS and CSS — immutable, cache 1 year (Vite adds content hashes to filenames)
    location ~* \.(js|css)$ {
        try_files $uri =404;
        add_header Cache-Control                "public, max-age=31536000, immutable"      always;
        add_header X-Content-Type-Options       "nosniff"                                  always;
        add_header X-Frame-Options              "DENY"                                     always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"          always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"      always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=()" always;
    }

    # Findings JSON — revalidate on each request
    location ~* \.json$ {
        try_files $uri =404;
        add_header Cache-Control                "no-cache, must-revalidate"                always;
        add_header X-Content-Type-Options       "nosniff"                                  always;
        add_header X-Frame-Options              "DENY"                                     always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"          always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"      always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=()" always;
    }
}
