name: Python Lint

on:
  push:
    branches: [main]
    paths:
      - 'ingest/**'
  pull_request:
    paths:
      - 'ingest/**'

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - run: pip install ruff bandit

      - name: Lint
        run: ruff check ingest/

      - name: Security scan
        run: bandit -r ingest/ -ll
