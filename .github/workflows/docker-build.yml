name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check dashboard is scaffolded
        id: check
        run: |
          if [ ! -f dashboard/package.json ]; then
            echo "dashboard/package.json not found — skipping build until dashboard is scaffolded"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        if: steps.check.outputs.skip == 'false'

      - name: Build image
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: dashboard
          push: false
          load: true
          tags: prowler-dashboard:scan

      - name: Scan image with Trivy
        if: steps.check.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: prowler-dashboard:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload image scan results to GitHub Security tab
        if: steps.check.outputs.skip == 'false' && !cancelled()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: trivy-image.sarif
