name: Shellcheck

on:
  push:
    branches: [main]
    paths:
      - 'prowler/**'
  pull_request:
    paths:
      - 'prowler/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: prowler
