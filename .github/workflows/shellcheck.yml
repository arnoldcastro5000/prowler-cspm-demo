name: Shellcheck

on:
  push:
    branches: [main]
    paths:
      - 'prowler/**'
  pull_request:
    paths:
      - 'prowler/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: prowler
