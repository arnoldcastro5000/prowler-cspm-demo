name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

permissions: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check dashboard is scaffolded
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "dashboard/package.json not found — skipping CI until dashboard is scaffolded"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
        if: steps.check.outputs.skip == 'false'

      - name: Type check
        if: steps.check.outputs.skip == 'false'
        run: npx tsc --noEmit

      - name: Lint
        if: steps.check.outputs.skip == 'false'
        run: npx eslint src

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build
